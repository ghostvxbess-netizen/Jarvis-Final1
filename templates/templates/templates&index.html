<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>
    <h2>Регистрация</h2>
    <form method="POST" action="/register">
        <input name="username" placeholder="логин">
        <input name="password" type="password" placeholder="пароль">
        <button>Создать</button>
    </form>

    <h2>Вход</h2>
    <form method="POST" action="/login">
        <input name="username" placeholder="логин">
        <input name="password" type="password" placeholder="пароль">
        <button>Войти</button>
    </form>
</body>
</html>
